services:
  - type: web
    name: viralflows-api
    env: node
    region: singapore
    plan: free
    branch: main
    rootDir: artifacts/api-server
    buildCommand: npx -y pnpm@latest install && npx -y pnpm@latest --filter @viralflows/api-server run build
    startCommand: node dist/artifacts/api-server/src/index.js
    healthCheckPath: /api/health
    autoDeploy: true
